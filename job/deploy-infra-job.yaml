apiVersion: v1
kind: ServiceAccount
metadata:
  name: deploy-infra
---
apiVersion: batch/v1
kind: Job
metadata:
  name: deploy-infra
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: deploy-infra
      restartPolicy: Never
      containers:
        - name: deploy
          image: quay.io/openshift/origin-cli:latest
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REPO_URL
              value: "https://github.com/mcarlett/smart-log-analyzer-ocp-infra.git"
            - name: REPO_REVISION
              value: "main"
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "=== Cloning repository ==="
              cd /tmp
              git clone --depth 1 --branch "${REPO_REVISION}" "${REPO_URL}" repo
              cd repo

              echo "=== Applying Tekton tasks ==="
              oc apply -n "${NAMESPACE}" -f tasks/

              echo "=== Applying Tekton pipeline ==="
              oc apply -n "${NAMESPACE}" -f pipeline/

              echo "=== Starting PipelineRun ==="
              PIPELINERUN=$(oc create -n "${NAMESPACE}" -f pipelinerun/infra-pipeline-run.yaml -o name)
              echo "Created ${PIPELINERUN}"

              echo "=== Waiting for PipelineRun to complete ==="
              oc wait "${PIPELINERUN}" \
                --for=condition=Succeeded \
                -n "${NAMESPACE}" --timeout=900s

              echo "=== Infrastructure deployed successfully ==="

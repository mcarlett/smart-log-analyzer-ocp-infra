apiVersion: v1
kind: ServiceAccount
metadata:
  name: deploy-infra
---
apiVersion: batch/v1
kind: Job
metadata:
  name: deploy-infra
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: deploy-infra
      restartPolicy: Never
      containers:
        - name: deploy
          image: quay.io/openshift/origin-cli:latest
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REPO_RAW
              value: "https://raw.githubusercontent.com/mcarlett/smart-log-analyzer-ocp-infra/main"
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "=== Applying Tekton tasks ==="
              for TASK in 00-init-workspace 01-deploy-minio 02-create-minio-buckets 03-create-secrets 04-deploy-lokistack 05-deploy-tempo 06-deploy-kafka 07-deploy-otel-collector; do
                oc apply -n "${NAMESPACE}" -f "${REPO_RAW}/tasks/${TASK}.yaml"
              done

              echo "=== Applying Tekton pipeline ==="
              oc apply -n "${NAMESPACE}" -f "${REPO_RAW}/pipeline/infra-pipeline.yaml"

              echo "=== Starting PipelineRun ==="
              PIPELINERUN=$(oc create -n "${NAMESPACE}" -f "${REPO_RAW}/pipelinerun/infra-pipeline-run.yaml" -o name)
              echo "Created ${PIPELINERUN}"

              echo "=== Waiting for PipelineRun to complete ==="
              oc wait "${PIPELINERUN}" \
                --for=condition=Succeeded \
                -n "${NAMESPACE}" --timeout=900s

              echo "=== Infrastructure deployed successfully ==="

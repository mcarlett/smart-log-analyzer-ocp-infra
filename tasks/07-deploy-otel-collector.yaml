apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-otel-collector
spec:
  params:
    - name: namespace
      type: string
      description: Target namespace for OpenTelemetry Collector deployment
  workspaces:
    - name: source
      description: Workspace containing the infrastructure manifests
  steps:
    - name: apply-otel-collector
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        NS="$(params.namespace)"
        RESOURCES="$(workspaces.source.path)/resources/otel-collector"

        echo "Creating OTel Collector ServiceAccount in namespace ${NS}..."
        oc apply -n "${NS}" -f "${RESOURCES}/serviceaccount.yaml"

        echo "Deploying OpenTelemetry Collector to namespace ${NS}..."
        oc apply -n "${NS}" -f "${RESOURCES}/collector.yaml"

        echo "Waiting for OpenTelemetry Collector to be ready..."
        oc wait --for=condition=Ready \
          opentelemetrycollector/camel-otel-collector \
          -n "${NS}" --timeout=300s || echo "Warning: OTel Collector not fully ready yet, continuing..."

        echo "OpenTelemetry Collector deployed."

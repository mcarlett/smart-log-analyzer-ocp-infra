apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-kafka
spec:
  params:
    - name: namespace
      type: string
      description: Target namespace for Kafka deployment
  workspaces:
    - name: source
      description: Workspace containing the infrastructure manifests
  steps:
    - name: apply-kafka
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        NS="$(params.namespace)"
        RESOURCES="$(workspaces.source.path)/resources/kafka"

        echo "Deploying KafkaNodePool to namespace ${NS}..."
        oc apply -n "${NS}" -f "${RESOURCES}/kafka-nodepool.yaml"

        echo "Deploying Kafka cluster to namespace ${NS}..."
        oc apply -n "${NS}" -f "${RESOURCES}/kafka-cluster.yaml"

        echo "Waiting for Kafka cluster to be ready..."
        oc wait kafka/camel-cluster \
          --for=condition=Ready \
          -n "${NS}" --timeout=300s || echo "Warning: Kafka not fully ready yet, continuing..."

        echo "Kafka deployed."

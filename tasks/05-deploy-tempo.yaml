apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-tempo
spec:
  params:
    - name: namespace
      type: string
      description: Target namespace for Tempo deployment
  workspaces:
    - name: source
      description: Workspace containing the infrastructure manifests
  steps:
    - name: apply-tempo
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        NS="$(params.namespace)"
        RESOURCES="$(workspaces.source.path)/resources/tempo"

        echo "Deploying TempoMonolithic to namespace ${NS}..."
        oc apply -n "${NS}" -f "${RESOURCES}/tempo.yaml"

        echo "Deploying Tempo RBAC roles..."
        oc apply -f "${RESOURCES}/tempo-roles.yaml"

        echo "Waiting for TempoMonolithic to be ready..."
        oc wait --for=condition=Ready tempomonolithic/tempostack-camel \
          -n "${NS}" --timeout=300s || echo "Warning: Tempo not fully ready yet, continuing..."

        echo "Tempo deployed."

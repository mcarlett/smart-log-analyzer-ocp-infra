apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: create-secrets
spec:
  params:
    - name: namespace
      type: string
      description: Target namespace for secrets
    - name: minio-user
      type: string
      default: "minioadmin"
    - name: minio-password
      type: string
      default: "minioadmin"
  steps:
    - name: create-lokistack-secret
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        NS="$(params.namespace)"
        ENDPOINT="http://minio-api.${NS}.svc.cluster.local:9000"
        USER="$(params.minio-user)"
        PASSWORD="$(params.minio-password)"

        echo "Creating LokiStack MinIO secret..."
        oc create secret generic lokistack-minio \
          --from-literal=bucketnames="lokistack" \
          --from-literal=endpoint="${ENDPOINT}" \
          --from-literal=access_key_id="${USER}" \
          --from-literal=access_key_secret="${PASSWORD}" \
          -n "${NS}" \
          --dry-run=client -o yaml | oc apply -f -

        echo "LokiStack secret created."

    - name: create-tempostack-secret
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        NS="$(params.namespace)"
        ENDPOINT="http://minio-api.${NS}.svc.cluster.local:9000"
        USER="$(params.minio-user)"
        PASSWORD="$(params.minio-password)"

        echo "Creating TempoStack MinIO secret..."
        oc create secret generic tempostack-minio \
          --from-literal=bucket="tempostack" \
          --from-literal=endpoint="${ENDPOINT}" \
          --from-literal=access_key_id="${USER}" \
          --from-literal=access_key_secret="${PASSWORD}" \
          -n "${NS}" \
          --dry-run=client -o yaml | oc apply -f -

        echo "TempoStack secret created."
